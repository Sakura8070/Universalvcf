<style>
body {
  margin:0;
  font-family:'Orbitron', sans-serif;
  background: radial-gradient(circle at center, #050816, #000);
  color:#9ffcff;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.header {
  display:flex;
  align-items:center;
  gap:15px;
}

.logo {
  width:70px;
  border-radius:50%;
  box-shadow:0 0 20px #00eaff;
}

.title {
  font-size:30px;
  background:linear-gradient(90deg,#00eaff,#6a5cff,#ff00ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.card {
  background: rgba(0,0,40,0.5);
  border:1px solid #00eaff33;
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
}

input, select {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#020a1f;
  color:#9ffcff;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00eaff,#6a5cff,#ff00ff);
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.progress {
  height:10px;
  background:#111;
  border-radius:10px;
}

.progress-bar {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00eaff,#ff00ff);
}

.stats {
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

.dashboard-item {
  padding:8px;
  border-bottom:1px solid #00eaff22;
}

.flag-select {
  display:flex;
  gap:10px;
}

.flag-select select {
  width:40%;
}

.flag-select input {
  width:60%;
}
</style>
</head>
