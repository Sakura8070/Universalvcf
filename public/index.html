<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ibugbe Alaafia VCF</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Orbitron', sans-serif;
  background: radial-gradient(circle at center, #050816, #000);
  color:#9ffcff;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.header {
  display:flex;
  align-items:center;
  gap:15px;
}

.logo {
  width:70px;
  border-radius:50%;
  box-shadow:0 0 20px #00eaff;
}

.title {
  font-size:30px;
  background:linear-gradient(90deg,#00eaff,#6a5cff,#ff00ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.card {
  background: rgba(0,0,40,0.5);
  border:1px solid #00eaff33;
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
}

input, select {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#020a1f;
  color:#9ffcff;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00eaff,#6a5cff,#ff00ff);
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.progress {
  height:10px;
  background:#111;
  border-radius:10px;
}

.progress-bar {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00eaff,#ff00ff);
}

.stats {
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

.dashboard-item {
  padding:8px;
  border-bottom:1px solid #00eaff22;
}

.flag-select {
  display:flex;
  gap:10px;
}

.flag-select select {
  width:40%;
}

.flag-select input {
  width:60%;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="https://files.catbox.moe/5wsk7t.jpg" class="logo">
<div class="title">Ibugbe Alaafia VCF</div>
</div>

<div class="slogan">⚡ Build Power. Code the Future. Unlock Digital Domination.</div>

<!-- PROGRESS -->
<div class="card">
<h3>📊 Progress</h3>
<div class="progress"><div class="progress-bar" id="bar"></div></div>
<div class="stats">
<span id="saved">0 / 500</span>
<span id="remaining">500 remaining</span>
</div>
</div>

<!-- FORM -->
<div class="card">
<h3>📥 Save Contact</h3>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">

<div class="flag-select">
<select id="country">
<option value="">🌍 Select Country Code</option>
</select>
<input id="phone" placeholder="Phone Number">
</div>

<button onclick="save()">💾 Save Contact</button>
</div>

<!-- DOWNLOAD -->
<div class="card">
<button id="downloadBtn" onclick="downloadVCF()" disabled>📥 Download VCF</button>
</div>

<!-- LAST ACTIVITIES -->
<div class="card">
<h3>📌 Last Activity</h3>
<div id="latest"></div>
</div>

<!-- DASHBOARD -->
<div class="card">
<h3>📈 Dashboard</h3>
<p id="dash"></p>
</div>

</div>

<!-- FLOAT BUTTONS -->
<div style="position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;">
<a href="https://wa.me/+22998068954">💬</a>
<a href="https://www.instagram.com/ken_v_sama">📸</a>
<a href="https://whatsapp.com/channel/0029VbClzNcKrWR269obxZ3R">📢</a>
</div>

<!-- 🔥 SCRIPT EXTERNE UNIQUEMENT -->
<script>

// ========================
// COUNTRIES (inchangé)
// ========================
const countries = [
  {name:"Nigeria", code:"234", flag:"🇳🇬"},
  {name:"Benin", code:"229", flag:"🇧🇯"},
  {name:"Togo", code:"228", flag:"🇹🇬"},
  {name:"Ghana", code:"233", flag:"🇬🇭"},
  {name:"Cameroon", code:"237", flag:"🇨🇲"},
  {name:"South Africa", code:"27", flag:"🇿🇦"},
  {name:"France", code:"33", flag:"🇫🇷"},
  {name:"USA", code:"1", flag:"🇺🇸"},
  {name:"India", code:"91", flag:"🇮🇳"},
  {name:"Brazil", code:"55", flag:"🇧🇷"},
  {name:"Japan", code:"81", flag:"🇯🇵"}
];

// ========================
// LOAD COUNTRIES
// ========================
const select = document.getElementById('country');

countries.sort((a,b)=>a.name.localeCompare(b.name));

countries.forEach(c=>{
  const opt = document.createElement('option');
  opt.value = c.code;
  opt.textContent = `${c.flag} ${c.name} (+${c.code})`;
  select.appendChild(opt);
});


// ========================
// SAVE CONTACT (FIXED)
// ========================
async function save(){
  const countryCode = document.getElementById('country').value;
  const phoneNumber = document.getElementById('phone').value;

  if(!phoneNumber){
    alert("Enter phone number");
    return;
  }

  if(!countryCode){
    alert("Select country code");
    return;
  }

  const fullPhone = `+${countryCode}${phoneNumber}`;

  try {
    const res = await fetch('/api/contact',{
      method:'POST',
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: name.value,
        email: email.value,
        country: countryCode,
        phone: fullPhone
      })
    });

    const data = await res.json();
    console.log("SAVE:", data);

    if(res.ok){
      alert("✅ Contact saved !");

      // 🔥 IMPORTANT: load sécurisé
      try {
        await load();
      } catch(e){
        console.warn("load error:", e);
      }

    } else {
      alert("❌ Error saving contact");
    }

  } catch(err){
    console.error("FETCH ERROR:", err);
    alert("🚨 Server error");
  }
}


// ========================
// LOAD DASHBOARD (AJOUT)
// ========================
async function load(){
  try {
    const res = await fetch('/api/stats');

    if(!res.ok) throw new Error("stats failed");

    const data = await res.json();
    console.log("STATS:", data);

    let total = data.total || 0;
    let remaining = 500 - total;
    let percent = Math.min((total/500)*100,100);

    // progress
    document.getElementById('bar').style.width = percent + "%";

    // stats text
    document.getElementById('saved').innerText = total + " / 500";
    document.getElementById('remaining').innerText = remaining + " remaining";

    // dashboard
    document.getElementById('dash').innerText =
      `Saved: ${total} | Remaining: ${remaining} | ${percent.toFixed(1)}%`;

    // latest
    const latestDiv = document.getElementById('latest');
    latestDiv.innerHTML = "";

    (data.latest || []).forEach(l=>{
      let d = document.createElement('div');
      d.className = 'dashboard-item';
      d.innerText = l.phone || "hidden";
      latestDiv.appendChild(d);
    });

  } catch(err){
    console.error("LOAD ERROR:", err);
  }
}


// ========================
// DOWNLOAD
// ========================
function downloadVCF(){
  window.location='/api/vcf';
}


// ========================
// AUTO LOAD
// ========================
load();

</script>

</body>
</html>
